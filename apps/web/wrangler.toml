name = "kostech-web"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "dist"

[vars]
SITE_URL = "https://kostech.md"
NUXT_PUBLIC_SITE_URL = "https://kostech.md"

# Run: wrangler d1 create kostech-web  → paste database_id below
[[d1_databases]]
binding = "DB"
database_name = "kostech-web"
database_id = "0ae67cd3-7f5a-469e-9ea2-8c3d5804824f"

[[kv_namespaces]]
binding = "CACHE"
id = "8763361cb5bb4cd092ad882e5502a062"

# Run: wrangler r2 bucket create kostech-web-media  → no ID needed, just bucket_name
[[r2_buckets]]
binding = "MEDIA"
bucket_name = "kostech-web-media"
